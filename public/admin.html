<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Waynes — root@admin:~#</title>
<meta name="robots" content="noindex" />
<style>
  :root{
    --bg:#0b1110; --bg2:#0f1715; --card:#141d1a; --card2:#19231f;
    --border:#1f2b26; --fg:#e8efe9; --muted:#8aa39a; --muted2:#647a72;
    --brand:#10b981; --brand2:#0ea5a0; --brand-fg:#02110c;
    --amber:#f59e0b; --rose:#f43f5e; --violet:#a78bfa; --sky:#38bdf8;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:rgba(16,185,129,.25)}
  /* Mono font for headings — terminal feel */
  h1,h2,h3,.mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;letter-spacing:-.02em}
  /* Scanlines overlay on body */
  body::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(16,185,129,.015) 2px,rgba(16,185,129,.015) 4px);pointer-events:none;z-index:9999}
  /* Glow text */
  .glow{text-shadow:0 0 8px rgba(16,185,129,.5)}
  /* Blinking cursor */
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  .cursor::after{content:"▊";animation:blink 1s infinite;color:var(--brand);margin-left:2px}
  a{color:inherit;text-decoration:none}
  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
  /* sidebar */
  .sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:18px 14px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px;border-bottom:1px solid var(--border);margin-bottom:12px}
  .brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;color:#fff;font-weight:800;box-shadow:0 8px 24px rgba(16,185,129,.3)}
  .brand h1{font-size:16px;margin:0;font-weight:800;letter-spacing:-.01em;text-shadow:0 0 10px rgba(16,185,129,.4)}
  .brand span{font-size:11px;color:var(--muted);font-family:ui-monospace,monospace}
  .nav{display:flex;flex-direction:column;gap:2px}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;padding:9px 11px;border:0;background:transparent;color:var(--muted);font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;text-align:left;transition:.15s;font-family:ui-monospace,monospace;text-transform:uppercase;letter-spacing:.02em}
  .nav button:hover{background:rgba(16,185,129,.06);color:var(--fg)}
  .nav button.active{background:rgba(16,185,129,.12);color:var(--brand);text-shadow:0 0 8px rgba(16,185,129,.4)}
  .nav button .ico{width:17px;height:17px;flex-shrink:0}
  .nav .sec{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);padding:14px 11px 6px;font-weight:700;font-family:ui-monospace,monospace}
  .badge-count{margin-left:auto;background:var(--amber);color:#1a1206;font-size:10px;font-weight:800;padding:1px 6px;border-radius:999px}
  /* main */
  .main{min-width:0}
  .topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:14px 24px;background:rgba(11,17,16,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .topbar h2{font-size:18px;margin:0;font-weight:700;letter-spacing:-.01em;text-shadow:0 0 8px rgba(16,185,129,.3)}
  .topbar .sub{font-size:12px;color:var(--muted);font-family:ui-monospace,monospace}
  .topbar .spacer{flex:1}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--fg);transition:.15s;white-space:nowrap}
  .btn:hover{border-color:var(--brand);color:var(--brand)}
  .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border-color:transparent;box-shadow:0 6px 18px rgba(16,185,129,.25)}
  .btn.primary:hover{filter:brightness(1.08);color:#fff}
  .btn.danger{color:var(--rose)} .btn.danger:hover{border-color:var(--rose);color:var(--rose)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.ghost{background:transparent}
  .content{padding:24px;max-width:1280px}
  /* cards / grid */
  .grid{display:grid;gap:16px}
  .kpi-grid{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
  .card h3{margin:0 0 4px;font-size:13px;color:var(--muted);font-weight:600}
  .kpi .val{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-top:6px}
  .kpi .delta{font-size:12px;color:var(--brand);margin-top:4px;display:flex;align-items:center;gap:4px}
  .kpi .delta.down{color:var(--rose)}
  .kpi .ico{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:rgba(16,185,129,.12);color:var(--brand);margin-bottom:10px}
  .kpi.amber .ico{background:rgba(245,158,11,.12);color:var(--amber)}
  .kpi.violet .ico{background:rgba(167,139,250,.12);color:var(--violet)}
  .kpi.sky .ico{background:rgba(56,189,248,.12);color:var(--sky)}
  .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .between{justify-content:space-between}
  .mt0{margin-top:0}.mt8{margin-top:8px}.mt16{margin-top:16px}.mt24{margin-top:24px}
  .mb0{margin-bottom:0}.mb8{margin-bottom:8px}.mb16{margin-bottom:16px}.mb24{margin-bottom:24px}
  /* tables */
  .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius)}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
  th,td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--border)}
  th{background:var(--card2);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;position:sticky;top:0;font-family:ui-monospace,monospace}
  tr:last-child td{border-bottom:0}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  td .strong{font-weight:600}
  td .muted{color:var(--muted);font-size:12px}
  .thumb{width:38px;height:26px;border-radius:6px;object-fit:cover;vertical-align:middle}
  .avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;vertical-align:middle}
  /* badges */
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.05em;font-family:ui-monospace,monospace;text-transform:uppercase}
  .b-pending{background:rgba(245,158,11,.14);color:var(--amber)}
  .b-approved{background:rgba(16,185,129,.14);color:var(--brand)}
  .b-rejected{background:rgba(244,63,94,.14);color:var(--rose)}
  .b-refunded{background:rgba(167,139,250,.14);color:var(--violet)}
  .b-muted{background:rgba(255,255,255,.06);color:var(--muted)}
  .b-brand{background:rgba(16,185,129,.14);color:var(--brand)}
  /* forms */
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
  input,select,textarea{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--fg);font-size:13px;font-family:inherit;outline:none;transition:.15s}
  input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(16,185,129,.15)}
  textarea{resize:vertical;min-height:80px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .switch{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .switch input{display:none}
  .track{width:38px;height:22px;border-radius:999px;background:var(--border);position:relative;transition:.2s}
  .track::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
  .switch input:checked + .track{background:var(--brand)}
  .switch input:checked + .track::after{transform:translateX(16px)}
  /* toolbar */
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .search{position:relative;flex:1;min-width:200px}
  .search input{padding-left:34px}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted)}
  .tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px}
  .tabs button{padding:6px 12px;border:0;background:transparent;color:var(--muted);font-size:12.5px;font-weight:600;border-radius:7px;cursor:pointer}
  .tabs button.active{background:var(--brand);color:#fff}
  /* timeline */
  .timeline{position:relative;padding-left:20px}
  .timeline::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border)}
  .tl-item{position:relative;padding:0 0 16px 8px}
  .tl-item::before{content:"";position:absolute;left:-19px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--brand);border:2px solid var(--bg2)}
  .tl-item .tl-time{font-size:11px;color:var(--muted)}
  .tl-item .tl-label{font-size:13px;font-weight:600;margin-top:2px}
  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:50;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-bg.open{display:flex}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:640px;max-height:88vh;overflow-y:auto}
  .modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card)}
  .modal-head h3{margin:0;font-size:16px;font-weight:700}
  .modal-body{padding:20px}
  /* toast */
  .toasts{position:fixed;bottom:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:8px}
  .toast{background:var(--card2);border:1px solid var(--border);border-left:3px solid var(--brand);padding:11px 16px;border-radius:10px;font-size:13px;box-shadow:0 12px 32px rgba(0,0,0,.4);animation:slidein .2s ease}
  .toast.err{border-left-color:var(--rose)}
  @keyframes slidein{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
  /* misc */
  .empty{text-align:center;padding:48px 20px;color:var(--muted)}
  .empty .ico{width:48px;height:48px;margin:0 auto 12px;opacity:.4}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:var(--card2);color:var(--muted)}
  .progress{height:6px;border-radius:999px;background:var(--border);overflow:hidden}
  .progress > div{height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2))}
  .note{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:8px}
  .note .meta{font-size:11px;color:var(--muted);margin-top:4px}
  .stat-line{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border)}
  .stat-line:last-child{border:0}
  .mobile-nav{display:none}
  @media(max-width:860px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;left:-260px;z-index:40;transition:.25s;width:248px}
    .sidebar.open{left:0}
    .mobile-nav{display:flex}
  }
</style>
</head>

/* ---------- Firestore sync (cross-device) ---------- */
// Pushes local state changes to Firestore so the main web app
// (which has real-time listeners) picks them up instantly.
function fsSyncCourses(){
  if(!window._fsdb||!window._fsSetDoc||!window._fsDoc)return;
  const s=read();
  (s.customCourses||[]).forEach(c=>{
    window._fsSetDoc(window._fsDoc(window._fsdb,"courses",c.id), c)
      .catch(e=>console.warn("[fs] course sync fail:",c.id,e.message));
  });
}
function fsSyncPayment(){
  if(!window._fsdb||!window._fsSetDoc||!window._fsDoc)return;
  const s=read();
  window._fsSetDoc(window._fsDoc(window._fsdb,"config","paymentSettings"), s.paymentSettings||{})
    .catch(e=>console.warn("[fs] payment sync fail:",e.message));
}
function fsDeleteCourse(id){
  if(!window._fsdb||!window._fsDeleteDoc||!window._fsDoc)return;
  window._fsDeleteDoc(window._fsDoc(window._fsdb,"courses",id))
    .catch(e=>console.warn("[fs] course delete fail:",id,e.message));
}
// On load, pull courses from Firestore and merge into local state
async function fsPullCourses(){
  if(!window._fsdb||!window._fsCollection||!window._fsGetDocs)return;
  try{
    const snap=await window._fsGetDocs(window._fsCollection(window._fsdb,"courses"));
    if(snap.empty)return;
    const fsCourses=[];
    snap.forEach(d=>{const data=d.data();if(data&&data.id)fsCourses.push({...data,id:d.id})});
    if(fsCourses.length===0)return;
    update(s=>{
      // Merge: Firestore courses + local-only custom courses
      const fsIds=new Set(fsCourses.map(c=>c.id));
      const localOnly=(s.customCourses||[]).filter(c=>!fsIds.has(c.id));
      s.customCourses=[...fsCourses,...localOnly];
    });
    console.log("[fs] pulled",fsCourses.length,"courses from Firestore");
  }catch(e){console.warn("[fs] pull courses fail:",e.message)}
}

/* ---------- toast ---------- */
function toast(msg,err){
  const t=document.createElement("div");
  t.className="toast"+(err?" err":"");
  t.textContent=msg;
  $("#toasts").appendChild(t);
  setTimeout(()=>{t.style.opacity=0;t.style.transition=".3s";setTimeout(()=>t.remove(),300)},2800);
}

/* ---------- activity helper ---------- */
function log(s,action,detail){
  s.activities.unshift({id:uid("a"),userName:"Admin",action,detail,createdAt:new Date().toISOString()});
  s.activities=s.activities.slice(0,200);
}

let TAB="dashboard";
function setTab(t){
  TAB=t;
  $$("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));
  $("#sidebar").classList.remove("open");
  render();
  if(location.hash!=="#"+t)history.replaceState(null,"","#"+t);
}
$$("#nav button").forEach(b=>b.addEventListener("click",()=>setTab(b.dataset.tab)));

const TITLES={
  dashboard:["Dashboard","Store overview & live metrics"],
  orders:["Orders","Approve, reject & refund orders"],
  courses:["Courses","Add, edit & manage course catalog"],
  coupons:["Coupons","Create & manage discount codes"],
  students:["Students","Learners derived from orders"],
  notifications:["Notifications","Broadcast to learners"],
  announcements:["Announcements","Pinned store-wide messages"],
  activity:["Activity Log","Audit trail of all actions"],
  payment:["Payment","UPI ID, QR code, bank details & checkout message"],
  data:["Data Tools","Backup, restore & reset"],
};

function render(){
  const s=read();
  $("#pageTitle").textContent=TITLES[TAB][0];
  $("#pageSub").textContent=TITLES[TAB][1];
  // pending count badge
  const pc=s.orders.filter(o=>o.status==="PENDING").length;
  $("#pendingCount").textContent=pc>0?pc:"";
  const c=$("#content");
  c.innerHTML="";
  if(TAB==="dashboard")c.innerHTML=renderDashboard(s);
  if(TAB==="orders")c.innerHTML=renderOrders(s);
  if(TAB==="courses")c.innerHTML=renderCourses(s);
  if(TAB==="coupons")c.innerHTML=renderCoupons(s);
  if(TAB==="students")c.innerHTML=renderStudents(s);
  if(TAB==="notifications")c.innerHTML=renderNotifications(s);
  if(TAB==="announcements")c.innerHTML=renderAnnouncements(s);
  if(TAB==="activity")c.innerHTML=renderActivity(s);
  if(TAB==="data")c.innerHTML=renderData(s);
  if(TAB==="payment")c.innerHTML=renderPayment(s);
  bindHandlers();
}

/* ============================================================
   DASHBOARD
   ============================================================ */
function renderDashboard(s){
  const revenue=s.orders.filter(o=>o.status==="APPROVED").reduce((n,o)=>n+o.finalAmount,0);
  const pending=s.orders.filter(o=>o.status==="PENDING").length;
  const students=new Set(s.orders.map(o=>o.userEmail)).size;
  const courses=CATARR.length;
  const recent=s.orders.slice(0,6);
  const kpi=(label,val,delta,cls,icon)=>`<div class="card kpi ${cls||""}"><div class="ico">${icon}</div><h3>${label}</h3><div class="val">${val}</div><div class="delta">${delta}</div></div>`;
  return `
  <div class="grid kpi-grid mb24">
    ${kpi("Total Revenue",money(revenue),"▲ 12% vs last week","","₹")}
    ${kpi("Pending Orders",pending,"Needs action","amber","⏳")}
    ${kpi("Students",fmt(students),"▲ 8% new","violet","👥")}
    ${kpi("Courses",courses,"Catalog live","sky","📚")}
  </div>
  <div class="grid" style="grid-template-columns:1.6fr 1fr;gap:16px">
    <div class="card">
      <div class="row between mb16"><h3 style="margin:0">Recent Orders</h3><button class="btn sm" onclick="setTab('orders')">View all →</button></div>
      <div class="table-wrap">
        <table><thead><tr><th>Order</th><th>Student</th><th>Amount</th><th>Status</th></tr></thead><tbody>
        ${recent.map(o=>`<tr style="cursor:pointer" onclick="openOrder('${o.id}')"><td><div class="strong">${esc(o.orderNumber)}</div><div class="muted">${esc(o.courseTitle)}</div></td><td><div class="strong">${esc(o.userName)}</div><div class="muted">${esc(o.userEmail)}</div></td><td>${money(o.finalAmount)}</td><td>${statusBadge(o.status)}</td></tr>`).join("")}
        </tbody></table>
      </div>
    </div>
    <div class="card">
      <h3 class="mt0 mb16">Recent Activity</h3>
      <div class="timeline">
        ${s.activities.slice(0,6).map(a=>`<div class="tl-item"><div class="tl-time">${timeAgo(a.createdAt)}</div><div class="tl-label">${esc(a.detail)}</div></div>`).join("")}
      </div>
    </div>
  </div>`;
}

function closeModal(){$("#modal").classList.remove("open")}
function addNote(id){
  const t=$("#noteText").value.trim();if(!t){toast("Enter a note",1);return}
  update(s=>{const o=s.orders.find(x=>x.id===id);if(o){o.notes=o.notes||[];o.notes.push({id:uid("note"),author:"Admin",text:t,at:new Date().toISOString()})}log(s,"NOTE_ADDED","Note added to "+id)});
  toast("Note added");openOrder(id);
}
function actOrder(id,act){
  update(s=>{
    const o=s.orders.find(x=>x.id===id);if(!o)return;
    const now=new Date().toISOString();
    if(act==="approve"){
      o.status="APPROVED";o.approvedAt=now;
      o.timeline.push({id:uid("t"),label:"Order approved — access granted",at:now,status:"APPROVED"});
      if(!s.enrollments.some(e=>e.userId===o.userId&&e.courseId===o.courseId))
        s.enrollments.push({id:uid("enr"),userId:o.userId,courseId:o.courseId,progress:0,completed:false,enrolledAt:now});
      // Find course (catalog or custom) to get download link
      const course=CAT[o.courseId]||(s.customCourses||[]).find(c=>c.id===o.courseId);
      const dl=course?.downloadUrl;
      const greeting=s.paymentSettings?.greetingMessage||"";
      const body=dl?`${greeting}\n\nYour enrollment in "${o.courseTitle}" is now active. Download link: ${dl}`:`${greeting}\n\nYour enrollment in "${o.courseTitle}" is now active. Start learning!`;
      s.notifications.unshift({id:uid("n"),userId:o.userId,type:"SUCCESS",title:"🎉 Access granted!",body:body,read:false,createdAt:now});
      log(s,"ORDER_APPROVED","Approved "+o.orderNumber);
    }
    if(act==="reject"){
      o.status="REJECTED";o.rejectedAt=now;
      o.timeline.push({id:uid("t"),label:"Order rejected",at:now,status:"REJECTED"});
      s.notifications.unshift({id:uid("n"),userId:o.userId,type:"WARNING",title:"Order could not be verified",body:"We couldn't verify your payment.",read:false,createdAt:now});
      log(s,"ORDER_REJECTED","Rejected "+o.orderNumber);
    }
    if(act==="refund"){
      o.status="REFUNDED";o.refundedAt=now;
      o.timeline.push({id:uid("t"),label:"Order refunded",at:now,status:"REFUNDED"});
      log(s,"ORDER_REFUNDED","Refunded "+o.orderNumber);
    }
  });
  toast("Order "+act+"d");
  if($("#modal").classList.contains("open"))openOrder(id);
}

function saveCourse(cid){
  const fields={};
  $$("[data-cid='"+cid+"']").forEach(el=>{
    const f=el.dataset.f;
    if(el.type==="checkbox")fields[f]=el.checked;
    else if(el.type==="number")fields[f]=el.value===""?null:Number(el.value);
  });
  update(s=>{
    s.courseOverrides=s.courseOverrides||{};
    s.courseOverrides[cid]={...(s.courseOverrides[cid]||{}),...fields};
    if(fields.comparePrice===null&&s.courseOverrides[cid])delete s.courseOverrides[cid].comparePrice;
    log(s,"COURSE_UPDATED","Updated course "+cid);
  });
  toast("Course updated — reload store to see");
}

function uploadCourseThumb(e){
  const f=e.target.files[0];if(!f)return;
  if(f.size>800000){toast("Image too large (max 800KB)",1);return}
  const r=new FileReader();
  r.onload=()=>{
    $("#cf_thumb").value=r.result;
    const prev=$("#cf_thumb_preview");
    if(prev.tagName==='IMG'){prev.src=r.result}else{const img=document.createElement('img');img.id='cf_thumb_preview';img.src=r.result;img.style.cssText='width:80px;height:50px;object-fit:cover;border:1px solid var(--border);border-radius:8px;background:#000';prev.replaceWith(img)}
    $("#cf_thumb_url").value="";
    toast("Thumbnail uploaded");
  };
  r.readAsDataURL(f);
}
function syncCourseThumb(){
  const url=($("#cf_thumb_url").value||"").trim();
  $("#cf_thumb").value=url;
  const prev=$("#cf_thumb_preview");
  if(url){
    if(prev.tagName==='IMG'){prev.src=url}else{const img=document.createElement('img');img.id='cf_thumb_preview';img.src=url;img.style.cssText='width:80px;height:50px;object-fit:cover;border:1px solid var(--border);border-radius:8px;background:#000';prev.replaceWith(img)}
  }
}
function saveCourseForm(id){
  const title=($("#cf_title").value||"").trim();
  if(!title){toast("Enter a title",1);return}
  const price=Number($("#cf_price").value)||0;
  const subtitle=($("#cf_subtitle").value||"").trim();
  const desc=($("#cf_desc").value||"").trim();
  const thumb=($("#cf_thumb").value||"").trim()||($("#cf_thumb_url").value||"").trim()||"https://picsum.photos/seed/"+encodeURIComponent(title)+"/800/450";
  const downloadUrl=($("#cf_download").value||"").trim()||undefined;
  const compare=($("#cf_compare").value)?Number($("#cf_compare").value):undefined;
  const level=($("#cf_level").value||"BEGINNER");
  const instructor=($("#cf_instructor").value||"Admin").trim();
  const benefits=($("#cf_benefits").value||"").split('\n').map(s=>s.trim()).filter(Boolean);
  const requirements=($("#cf_req").value||"").split('\n').map(s=>s.trim()).filter(Boolean);
  const featured=$("#cf_featured").checked;
  const published=$("#cf_published").checked;
  update(s=>{
    if(id){
      s.customCourses=s.customCourses.map(c=>c.id===id?{...c,title,subtitle,description:desc,thumbnail:thumb,downloadUrl,price,comparePrice:compare,level,instructorId:instructor,benefits,requirements,featured,published,updatedAt:new Date().toISOString()}:c);
      log(s,"COURSE_EDITED","Edited course: "+title);
    }else{
      const nid="custom-"+Date.now();
      const slug=title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')+'-'+nid.slice(-4);
      s.customCourses.unshift({
        id:nid,slug,title,subtitle,description:desc,thumbnail:thumb,downloadUrl,price,comparePrice:compare,currency:"INR",level,language:"English",durationMins:0,benefits,requirements,faqs:[],featured,published,rating:0,reviewCount:0,studentCount:0,instructorId:instructor,categoryId:"cat-web",tags:[],sections:[],createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()
      });
      log(s,"COURSE_CREATED","Created course: "+title);
    }
  });
  closeModal();
  toast(id?"Course updated — reload store":"Course created — reload store");
  fsSyncCourses(); // push to Firestore for cross-device sync
}
function deleteCustomCourse(id){
  if(!confirm("Delete this custom course? This cannot be undone."))return;
  update(s=>{s.customCourses=s.customCourses.filter(c=>c.id!==id);log(s,"COURSE_DELETED","Deleted course "+id)});
  toast("Course deleted");
  fsDeleteCourse(id); // remove from Firestore
}

function uploadQR(e){
  const f=e.target.files[0];if(!f)return;
  if(f.size>500000){toast("QR image too large (max 500KB)",1);return}
  const r=new FileReader();
  r.onload=()=>{
    update(s=>{s.paymentSettings=s.paymentSettings||{};s.paymentSettings.qrImage=r.result;log(s,"PAYMENT_QR_UPDATED","Updated QR code")});
    toast("QR uploaded");
  };
  r.readAsDataURL(f);
}
function removeQR(){
  update(s=>{s.paymentSettings=s.paymentSettings||{};s.paymentSettings.qrImage="";log(s,"PAYMENT_QR_REMOVED","Removed QR code")});
  toast("QR removed");
}
function savePayment(){
  const patch={
    upiId:($("#ps_upi").value||"").trim(),
    payeeName:($("#ps_payee").value||"").trim(),
    methods:{upi:$("#ps_m_upi").checked,bank:$("#ps_m_bank").checked,card:$("#ps_m_card").checked},
    bankDetails:{accountName:($("#ps_acct_name").value||"").trim(),accountNumber:($("#ps_acct_no").value||"").trim(),ifsc:($("#ps_ifsc").value||"").trim(),bankName:($("#ps_bank_name").value||"").trim()},
    instructions:($("#ps_instructions").value||"").trim(),
    greetingMessage:($("#ps_greeting").value||"").trim(),
  };
  update(s=>{s.paymentSettings={...s.paymentSettings,...patch};log(s,"PAYMENT_SETTINGS_SAVED","Saved payment settings")});
  toast("Payment settings saved — reload store to see");
  fsSyncPayment(); // push to Firestore for cross-device sync
}
function renderCoupons(s){
  return `
  <div class="grid" style="grid-template-columns:1fr 320px;gap:16px">
    <div class="card">
      <h3 class="mt0 mb16">All Coupons</h3>
      <div class="table-wrap">
        <table><thead><tr><th>Code</th><th>Type</th><th>Value</th><th>Scope</th><th>Usage</th><th>Valid</th><th>Active</th><th></th></tr></thead><tbody>
        ${s.couponList.map(c=>{
          const usage=c.usageLimit?`${c.usedCount}/${c.usageLimit}`:c.usedCount;
          const pct=c.usageLimit?Math.round(c.usedCount/c.usageLimit*100):0;
          return `<tr>
            <td class="strong" style="font-family:monospace">${esc(c.code)}</td>
            <td><span class="pill">${c.type}</span></td>
            <td>${c.type==="PERCENT"?c.value+"%":money(c.value)}</td>
            <td class="muted">${c.courseId?(esc((CAT[c.courseId]||{}).title||c.courseId).slice(0,24)+"…"):"Global"}</td>
            <td><div class="muted">${usage}</div><div class="progress" style="margin-top:4px"><div style="width:${pct}%"></div></div></td>
            <td class="muted">${c.expiresAt?dt(c.expiresAt):"—"}</td>
            <td><label class="switch"><input type="checkbox" ${c.active?'checked':''} onchange="toggleCoupon('${c.id}')"/><span class="track"></span></label></td>
            <td><button class="btn sm danger" onclick="deleteCoupon('${c.id}')">🗑</button></td>
          </tr>`;
        }).join("")}
        </tbody></table>
      </div>
    </div>
    <div class="card">
      <h3 class="mt0 mb16">Create Coupon</h3>
      <div class="field"><label>Code</label><input id="cpCode" placeholder="SUMMER20" style="text-transform:uppercase"/></div>
      <div class="grid-2">
        <div class="field"><label>Type</label><select id="cpType"><option value="PERCENT">Percent</option><option value="FIXED">Fixed ₹</option></select></div>
        <div class="field"><label>Value</label><input id="cpValue" type="number" placeholder="20"/></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Min Amount</label><input id="cpMin" type="number" value="0"/></div>
        <div class="field"><label>Usage Limit</label><input id="cpLimit" type="number" placeholder="100"/></div>
      </div>
      <div class="field"><label>Course (blank = global)</label><select id="cpCourse"><option value="">All courses</option>${CATARR.map(c=>`<option value="${c.id}">${esc(c.title)}</option>`).join("")}</select></div>
      <div class="field"><label>Expires</label><input id="cpExp" type="date"/></div>
      <button class="btn primary" onclick="createCoupon()" style="width:100%;justify-content:center">+ Create Coupon</button>
    </div>
  </div>`;
}
function toggleCoupon(id){update(s=>{const c=s.couponList.find(x=>x.id===id);if(c){c.active=!c.active;log(s,"COUPON_TOGGLED",(c.active?"Enabled":"Disabled")+" "+c.code)}});toast("Coupon updated")}
function deleteCoupon(id){update(s=>{s.couponList=s.couponList.filter(c=>c.id!==id);log(s,"COUPON_DELETED","Deleted coupon")});toast("Coupon deleted")}
function createCoupon(){
  const code=($("#cpCode").value||"").trim().toUpperCase();
  if(!code){toast("Enter a code",1);return}
  const type=$("#cpType").value;
  const value=Number($("#cpValue").value);
  if(!value&&value!==0){toast("Enter a value",1);return}
  const cp={id:uid("cp"),code,type,value,minAmount:Number($("#cpMin").value)||0,usageLimit:Number($("#cpLimit").value)||null,perUserLimit:1,courseId:$("#cpCourse").value||null,startsAt:new Date().toISOString(),expiresAt:$("#cpExp").value?new Date($("#cpExp").value).toISOString():null,active:true,usedCount:0};
  update(s=>{s.couponList.push(cp);log(s,"COUPON_CREATED","Created coupon "+code)});
  toast("Coupon "+code+" created");
}

/* ============================================================
   STUDENTS
   ============================================================ */
function renderStudents(s){
  const map={};
  s.orders.forEach(o=>{if(!map[o.userEmail])map[o.userEmail]={name:o.userName,email:o.userEmail,orders:0,spent:0,last:o.createdAt};map[o.userEmail].orders++;if(o.status==="APPROVED")map[o.userEmail].spent+=o.finalAmount;if(o.createdAt>map[o.userEmail].last)map[o.userEmail].last=o.createdAt});
  const list=Object.values(map).sort((a,b)=>b.spent-a.spent);
  return `
  <div class="table-wrap">
    <table><thead><tr><th>Student</th><th>Orders</th><th>Total Spent</th><th>Last Order</th></tr></thead><tbody>
    ${list.length?list.map(st=>`<tr>
      <td><div class="row" style="gap:10px"><img class="avatar" src="https://i.pravatar.cc/60?u=${encodeURIComponent(st.email)}" alt=""/><div><div class="strong">${esc(st.name)}</div><div class="muted">${esc(st.email)}</div></div></div></td>
      <td><span class="pill">${st.orders}</span></td>
      <td class="strong" style="color:var(--brand)">${money(st.spent)}</td>
      <td class="muted">${timeAgo(st.last)}</td>
    </tr>`).join(""):`<tr><td colspan="4"><div class="empty">No students yet.</div></td></tr>`}
    </tbody></table>
  </div>`;
}

/* ============================================================
   NOTIFICATIONS
   ============================================================ */
function renderNotifications(s){
  return `
  <div class="grid" style="grid-template-columns:1fr 320px;gap:16px">
    <div class="card">
      <h3 class="mt0 mb16">Sent Notifications</h3>
      <div style="max-height:560px;overflow-y:auto" class="scrollbar-thin">
      ${s.notifications.length?s.notifications.map(n=>`<div style="padding:12px;border-bottom:1px solid var(--border)">
        <div class="row between"><span class="badge ${n.type==='SUCCESS'?'b-approved':n.type==='WARNING'?'b-rejected':n.type==='ANNOUNCEMENT'?'b-refunded':'b-muted'}">${esc(n.type)}</span><span class="muted" style="font-size:11px">${timeAgo(n.createdAt)}</span></div>
        <div class="strong mt8">${esc(n.title)}</div><div class="muted" style="font-size:12px">${esc(n.body)}</div>
      </div>`).join(""):'<div class="empty">No notifications.</div>'}
      </div>
    </div>
    <div class="card">
      <h3 class="mt0 mb16">Broadcast</h3>
      <div class="field"><label>Type</label><select id="ntType"><option value="INFO">Info</option><option value="SUCCESS">Success</option><option value="WARNING">Warning</option><option value="ANNOUNCEMENT">Announcement</option><option value="ORDER">Order</option></select></div>
      <div class="field"><label>Title</label><input id="ntTitle" placeholder="New course live!"/></div>
      <div class="field"><label>Body</label><textarea id="ntBody" placeholder="Message to all learners…"></textarea></div>
      <div class="field"><label>Link (optional)</label><input id="ntLink" placeholder="course-4"/></div>
      <button class="btn primary" onclick="broadcast()" style="width:100%;justify-content:center">📡 Broadcast</button>
    </div>
  </div>`;
}
function broadcast(){
  const title=($("#ntTitle").value||"").trim();if(!title){toast("Enter a title",1);return}
  const body=($("#ntBody").value||"").trim();
  const type=$("#ntType").value;const link=($("#ntLink").value||"").trim()||null;
  update(s=>{s.notifications.unshift({id:uid("n"),userId:null,type,title,body,link,read:false,createdAt:new Date().toISOString()});log(s,"NOTIFICATION_BROADCAST","Broadcast: "+title)});
  toast("Broadcast sent");
}

/* ============================================================
   ANNOUNCEMENTS
   ============================================================ */
function renderAnnouncements(s){
  return `
  <div class="grid" style="grid-template-columns:1fr 320px;gap:16px">
    <div class="card">
      <h3 class="mt0 mb16">Announcements</h3>
      ${s.announcements.length?s.announcements.map(a=>`<div style="padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:10px">
        <div class="row between"><div class="strong">${esc(a.title)}</div><div class="row" style="gap:6px"><label class="switch"><input type="checkbox" ${a.active?'checked':''} onchange="toggleAn('${a.id}')"/><span class="track"></span></label><button class="btn sm danger" onclick="delAn('${a.id}')">🗑</button></div></div>
        <div class="muted mt8" style="font-size:12px">${esc(a.body)}</div>
        <div class="row mt8" style="gap:6px"><span class="pill">${esc(a.audience)}</span>${a.pinned?'<span class="pill b-brand">📌 Pinned</span>':''}<span class="muted" style="font-size:11px">${timeAgo(a.createdAt)}</span></div>
      </div>`).join(""):'<div class="empty">No announcements.</div>'}
    </div>
    <div class="card">
      <h3 class="mt0 mb16">New Announcement</h3>
      <div class="field"><label>Title</label><input id="anTitle" placeholder="Holiday sale!"/></div>
      <div class="field"><label>Body</label><textarea id="anBody" placeholder="Details…"></textarea></div>
      <div class="field"><label>Audience</label><select id="anAud"><option value="ALL">Everyone</option><option value="STUDENTS">Students only</option></select></div>
      <div class="field"><label class="switch"><input type="checkbox" id="anPin" checked/><span class="track"></span><span>Pin to top</span></label></div>
      <button class="btn primary" onclick="createAn()" style="width:100%;justify-content:center">+ Publish</button>
    </div>
  </div>`;
}
function createAn(){
  const title=($("#anTitle").value||"").trim();if(!title){toast("Enter a title",1);return}
  const body=($("#anBody").value||"").trim();const audience=$("#anAud").value;const pinned=$("#anPin").checked;
  update(s=>{s.announcements.unshift({id:uid("an"),title,body,audience,pinned,active:true,createdAt:new Date().toISOString()});log(s,"ANNOUNCEMENT_CREATED","Created: "+title)});
  toast("Announcement published");
}
function toggleAn(id){update(s=>{const a=s.announcements.find(x=>x.id===id);if(a)a.active=!a.active});toast("Updated")}
function delAn(id){update(s=>{s.announcements=s.announcements.filter(a=>a.id!==id)});toast("Deleted")}

/* ============================================================
   ACTIVITY
   ============================================================ */
function renderActivity(s){
  return `<div class="card"><div class="timeline">${s.activities.map(a=>`<div class="tl-item"><div class="tl-time">${dt(a.createdAt)}</div><div class="tl-label">${esc(a.detail)}</div><div class="muted" style="font-size:11px">${esc(a.userName||"System")} · ${esc(a.action)} ${a.ip?'· '+esc(a.ip):''}</div></div>`).join("")}</div></div>`;
}

/* ============================================================
   DATA TOOLS
   ============================================================ */
function renderData(s){
  const size=new Blob([JSON.stringify({state:s})]).size;
  return `
  <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr))">
    <div class="card"><h3 class="mt0">Records</h3><div class="stat-line"><span>Orders</span><strong>${s.orders.length}</strong></div><div class="stat-line"><span>Coupons</span><strong>${s.couponList.length}</strong></div><div class="stat-line"><span>Notifications</span><strong>${s.notifications.length}</strong></div><div class="stat-line"><span>Activities</span><strong>${s.activities.length}</strong></div></div>
    <div class="card"><h3 class="mt0">Storage</h3><div class="stat-line"><span>Key</span><strong style="font-family:monospace">waynes-lms</strong></div><div class="stat-line"><span>Size</span><strong>${(size/1024).toFixed(1)} KB</strong></div></div>
  </div>
  <div class="card mt16">
    <h3 class="mt0 mb8">Backup & Restore</h3>
    <p class="muted mb16">Export the full store data as JSON, or import a previous backup.</p>
    <div class="row"><button class="btn" onclick="exportData()">⬇ Export JSON</button>
    <label class="btn">⬆ Import JSON<input type="file" accept="application/json" style="display:none" onchange="importData(event)"/></label>
    <button class="btn danger" onclick="resetData()">🗑 Reset All Data</button></div>
  </div>`;
}
function exportData(){
  const s=read();const blob=new Blob([JSON.stringify({state:s},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="waynes-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();toast("Backup downloaded");
}
function importData(e){
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);const st=d.state||d;write(st);render();toast("Data imported — reload store")}catch(err){toast("Invalid file",1)}};
  r.readAsText(f);
}
function resetData(){
  if(!confirm("Reset ALL data to seed? This cannot be undone."))return;
  const s=seedState();write(s);render();toast("Data reset to seed");
}
function exportCSV(orders){
  const head=["Order","Student","Email","Course","Amount","Discount","Final","Status","Coupon","PaymentRef","Date"];
  const rows=orders.map(o=>[o.orderNumber,o.userName,o.userEmail,o.courseTitle,o.amount,o.discount,o.finalAmount,o.status,o.couponCode||"",o.paymentRef||"",o.createdAt]);
  const csv=[head,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="waynes-orders.csv";a.click();toast("CSV exported");
}

/* ---------- bind dynamic handlers (re-render safe) ---------- */
function bindHandlers(){}

/* ---------- init ---------- */
(async function init(){
  const hash=location.hash.slice(1);
  if(hash&&TITLES[hash])TAB=hash;
  await loadCourses();
  $$("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===TAB));
  render();
  // Pull courses from Firestore (cross-device sync)
  setTimeout(fsPullCourses, 1500);
  // re-sync if another tab changes localStorage
  window.addEventListener("storage",e=>{if(e.key===KEY)render()});
})();
</script>
